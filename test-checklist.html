<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试验证清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: #F6F1E8;
            color: #1F2421;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background: #2A2723;
            color: #F6F1E8;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #C8853F;
            font-size: 0.95rem;
        }

        .controls {
            background: #FBF7EF;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid #E2D9C8;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        input[type="text"],
        select {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #E2D9C8;
            border-radius: 6px;
            background: white;
            font-size: 0.95rem;
        }

        input[type="text"]:focus,
        select:focus {
            outline: 2px solid #C8853F;
            border-color: #C8853F;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #C8853F;
            color: white;
        }

        .btn-primary:hover {
            background: #A86B2C;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #E2D9C8;
            color: #1F2421;
        }

        .btn-secondary:hover {
            background: #d0c7b6;
        }

        .category {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #F0E3D0;
        }

        .category-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2A2723;
        }

        .category-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: #8A8A80;
        }

        .test-item {
            background: #FBF7EF;
            border: 1px solid #E2D9C8;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s;
        }

        .test-item:hover {
            border-color: #C8853F;
        }

        .test-item.passed {
            border-left: 4px solid #4CAF50;
        }

        .test-item.failed {
            border-left: 4px solid #f44336;
        }

        .test-header {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .test-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            border: 1px solid #E2D9C8;
            background: white;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .action-btn.pass {
            color: #4CAF50;
        }

        .action-btn.pass:hover,
        .action-btn.pass.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .action-btn.fail {
            color: #f44336;
        }

        .action-btn.fail:hover,
        .action-btn.fail.active {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .action-btn.delete {
            color: #8A8A80;
        }

        .action-btn.delete:hover {
            background: #8A8A80;
            color: white;
        }

        .test-content {
            flex: 1;
        }

        .test-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .test-reason {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: white;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #8A8A80;
        }

        .test-reason textarea {
            width: 100%;
            border: 1px solid #E2D9C8;
            border-radius: 4px;
            padding: 0.5rem;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #8A8A80;
        }

        .timestamp {
            font-size: 0.8rem;
            color: #8A8A80;
            margin-top: 0.25rem;
        }

        .export-import {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 测试验证清单</h1>
            <div class="subtitle">HarmonyOS 果品分拣应用 - 功能测试管理</div>
        </header>

        <div class="controls">
            <div class="input-group">
                <select id="categorySelect">
                    <option value="WebSocket数据链路">WebSocket数据链路</option>
                    <option value="CTCP通信">CTCP通信</option>
                    <option value="数据库">数据库</option>
                    <option value="前端UI">前端UI</option>
                    <option value="其他">其他</option>
                </select>
                <input type="text" id="testInput" placeholder="输入测试项名称，例如：前端连接 WebSocket 成功">
                <button class="btn-primary" onclick="addTest()">➕ 添加测试项</button>
            </div>
            <div class="export-import">
                <button class="btn-secondary" onclick="exportData()">📥 导出数据</button>
                <button class="btn-secondary" onclick="importData()">📤 导入数据</button>
                <button class="btn-secondary" onclick="clearAll()">🗑️ 清空所有</button>
            </div>
        </div>

        <div id="testList"></div>
    </div>

    <script>
        let testData = JSON.parse(localStorage.getItem('testChecklist') || '{}');

        function saveData() {
            localStorage.setItem('testChecklist', JSON.stringify(testData));
            render();
        }

        function addTest() {
            const category = document.getElementById('categorySelect').value;
            const name = document.getElementById('testInput').value.trim();

            if (!name) {
                alert('请输入测试项名称');
                return;
            }

            if (!testData[category]) {
                testData[category] = [];
            }

            testData[category].push({
                id: Date.now(),
                name: name,
                status: 'pending', // pending, passed, failed
                reason: '',
                timestamp: new Date().toLocaleString('zh-CN')
            });

            document.getElementById('testInput').value = '';
            saveData();
        }

        function updateStatus(category, id, status) {
            const item = testData[category].find(t => t.id === id);
            if (item) {
                item.status = item.status === status ? 'pending' : status;
                item.timestamp = new Date().toLocaleString('zh-CN');
                saveData();
            }
        }

        function updateReason(category, id, reason) {
            const item = testData[category].find(t => t.id === id);
            if (item) {
                item.reason = reason;
                saveData();
            }
        }

        function deleteTest(category, id) {
            if (confirm('确定删除此测试项？')) {
                testData[category] = testData[category].filter(t => t.id !== id);
                if (testData[category].length === 0) {
                    delete testData[category];
                }
                saveData();
            }
        }

        function render() {
            const listEl = document.getElementById('testList');

            if (Object.keys(testData).length === 0) {
                listEl.innerHTML = '<div class="empty-state">暂无测试项，点击上方按钮添加</div>';
                return;
            }

            listEl.innerHTML = Object.keys(testData).map(category => {
                const items = testData[category];
                const passed = items.filter(t => t.status === 'passed').length;
                const failed = items.filter(t => t.status === 'failed').length;
                const total = items.length;

                return `
                    <div class="category">
                        <div class="category-header">
                            <div class="category-title">${category}</div>
                            <div class="category-stats">
                                <span>✅ ${passed}</span>
                                <span>❌ ${failed}</span>
                                <span>📋 ${total}</span>
                            </div>
                        </div>
                        ${items.map(item => `
                            <div class="test-item ${item.status}">
                                <div class="test-header">
                                    <div class="test-actions">
                                        <button class="action-btn pass ${item.status === 'passed' ? 'active' : ''}"
                                                onclick="updateStatus('${category}', ${item.id}, 'passed')"
                                                title="通过">✓</button>
                                        <button class="action-btn fail ${item.status === 'failed' ? 'active' : ''}"
                                                onclick="updateStatus('${category}', ${item.id}, 'failed')"
                                                title="失败">✕</button>
                                        <button class="action-btn delete"
                                                onclick="deleteTest('${category}', ${item.id})"
                                                title="删除">🗑</button>
                                    </div>
                                    <div class="test-content">
                                        <div class="test-name">${item.name}</div>
                                        <div class="timestamp">${item.timestamp}</div>
                                        ${item.status === 'failed' || item.reason ? `
                                            <div class="test-reason">
                                                <textarea placeholder="失败原因或备注..."
                                                          onchange="updateReason('${category}', ${item.id}, this.value)">${item.reason}</textarea>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }

        function exportData() {
            const dataStr = JSON.stringify(testData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `测试清单_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        testData = JSON.parse(event.target.result);
                        saveData();
                        alert('导入成功！');
                    } catch (err) {
                        alert('导入失败：文件格式错误');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAll() {
            if (confirm('确定清空所有测试数据？此操作不可恢复！')) {
                testData = {};
                saveData();
            }
        }

        // 快捷键支持
        document.getElementById('testInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                addTest();
            }
        });

        // 初始渲染
        render();
    </script>
</body>
</html>
